<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stainless Max - Yönetim Paneli</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-primary: #0f111a;
            --bg-secondary: #1a1d29;
            --bg-tertiary: #232738;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border-subtle: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
        }

        /* Login Layout */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
            text-align: center;
            width: 300px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: var(--accent);
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .login-box button:hover {
            background: #4f46e5;
        }

        #admin-panel {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        /* Top Bar */
        .top-bar {
            height: 60px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .top-bar h1 {
            font-size: 1.2rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Content Area */
        .content {
            padding: 30px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .overview-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            padding: 20px;
            border-radius: 12px;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
        }

        .table-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .table-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-subtle);
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-subtle);
        }

        th {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .badge-free {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .badge-pro {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }

        .badge-ultra {
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
        }

        select.plan-select {
            background: rgba(0, 0, 0, 0.2);
            color: white;
            border: 1px solid var(--border-subtle);
            padding: 5px;
            border-radius: 4px;
            outline: none;
        }

        .promo-form {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .promo-form input {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="login-box">
            <h2><i class="fas fa-shield-alt"></i> Admin Girişi</h2>
            <input type="password" id="admin-token" placeholder="Güvenlik Anahtarı" autofocus>
            <button onclick="loginAdmin()">Giriş Yap</button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel">
        <div class="top-bar">
            <h1><i class="fas fa-server"></i> Stainless Max Yönetim</h1>
            <button class="btn-logout" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Çıkış</button>
        </div>

        <div class="content">
            <div class="overview-cards">
                <div class="card">
                    <h3>Toplam Kullanıcı</h3>
                    <div class="value" id="stat-users">0</div>
                </div>
                <div class="card">
                    <h3>Günlük Video Üretimi</h3>
                    <div class="value" id="stat-videos">0</div>
                </div>
                <div class="card">
                    <h3>Sistem Durumu</h3>
                    <div class="value" id="stat-status" style="color: var(--success); font-size: 1.5rem;">Online</div>
                </div>
            </div>

            <div class="table-container">
                <div class="table-header">Kullanıcı Yönetimi</div>
                <table>
                    <thead>
                        <tr>
                            <th>Ad Soyad</th>
                            <th>E-posta</th>
                            <th>Kayıt Tarihi</th>
                            <th>Plan</th>
                            <th>Aksiyon</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <!-- JS Populate -->
                    </tbody>
                </table>
            </div>

            <div class="table-container">
                <div class="table-header" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>Promosyon Kodları</span>
                </div>
                <div style="padding: 15px 20px;">
                    <div class="promo-form">
                        <input type="text" id="new-promo-code" placeholder="Kod (Örn: YILBASI50)">
                        <select id="new-promo-plan" class="plan-select" style="padding: 10px;">
                            <option value="pro">Pro Plan</option>
                            <option value="ultra">Ultra Plan</option>
                        </select>
                        <input type="number" id="new-promo-uses" placeholder="Kullanım Limiti (Örn: 10)">
                        <button class="btn-primary" onclick="createPromoCode()">Oluştur</button>
                    </div>
                    <table style="margin-top: 15px;">
                        <thead>
                            <tr>
                                <th>Kod</th>
                                <th>Hedef Plan</th>
                                <th>Kullanım Limiti</th>
                                <th>Kullanılan</th>
                            </tr>
                        </thead>
                        <tbody id="promo-table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let adminToken = localStorage.getItem('admin_token');

        function loginAdmin() {
            const t = document.getElementById('admin-token').value;
            if (!t) return;
            localStorage.setItem('admin_token', t);
            adminToken = t;
            initAdmin();
        }

        function logoutAdmin() {
            localStorage.removeItem('admin_token');
            window.location.reload();
        }

        async function fetchAPI(url, options = {}) {
            if (!options.headers) options.headers = {};
            options.headers['X-Admin-Token'] = adminToken;
            options.headers['Content-Type'] = 'application/json';

            const res = await fetch(url, options);
            if (res.status === 403) {
                alert("Geçersiz veya süresi dolmuş Admin Anahtarı!");
                logoutAdmin();
                throw new Error("403 Unauthorized");
            }
            return res;
        }

        async function loadStats() {
            const res = await fetchAPI('/api/admin/stats');
            const data = await res.json();
            document.getElementById('stat-users').innerText = data.total_users || 0;
            document.getElementById('stat-videos').innerText = data.videos_today || 0;
            document.getElementById('stat-status').innerText = data.system_status || 'Offline';
        }

        async function loadUsers() {
            const res = await fetchAPI('/api/admin/users');
            const data = await res.json();
            const tbody = document.getElementById('user-table-body');
            tbody.innerHTML = '';
            (data.users || []).forEach(u => {
                const badgeClass = u.plan === 'ultra' ? 'badge-ultra' : (u.plan === 'pro' ? 'badge-pro' : 'badge-free');
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:bold;">${u.name} ${u.surname || ''}</td>
                        <td style="color:var(--text-secondary);">${u.email}</td>
                        <td>${u.created_at ? u.created_at.substring(0, 10) : '-'}</td>
                        <td><span class="badge ${badgeClass}">${(u.plan || 'free').toUpperCase()}</span></td>
                        <td>
                            <select class="plan-select" onchange="changeUserPlan('${u.id}', this.value)">
                                <option value="" disabled selected>Plan Değiştir</option>
                                <option value="free">Free Yap</option>
                                <option value="pro">Pro Yap</option>
                                <option value="ultra">Ultra Yap</option>
                            </select>
                        </td>
                    </tr>
                `;
            });
        }

        async function changeUserPlan(userId, newPlan) {
            if (!confirm(`Kullanıcının planı ${newPlan.toUpperCase()} olarak güncellenecek, emin misiniz?`)) return loadUsers();

            try {
                const res = await fetchAPI(`/api/admin/users/${userId}/plan`, {
                    method: 'PUT',
                    body: JSON.stringify({ plan: newPlan })
                });
                if (res.ok) {
                    loadUsers();
                } else {
                    const data = await res.json();
                    alert(data.error);
                }
            } catch (e) { }
        }

        async function loadPromos() {
            const res = await fetchAPI('/api/admin/promo');
            const data = await res.json();
            const tbody = document.getElementById('promo-table-body');
            tbody.innerHTML = '';
            (data.promo_codes || []).forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:bold; letter-spacing:1px; color:#10b981;">${p.code}</td>
                        <td>${strToPlanBadge(p.target_plan)}</td>
                        <td>${p.max_uses}</td>
                        <td>${p.current_uses}</td>
                    </tr>
                `;
            });
        }

        function strToPlanBadge(plan) {
            const c = plan === 'ultra' ? 'badge-ultra' : (plan === 'pro' ? 'badge-pro' : 'badge-free');
            return `<span class="badge ${c}">${(plan || 'FREE').toUpperCase()}</span>`;
        }

        async function createPromoCode() {
            const code = document.getElementById('new-promo-code').value;
            const plan = document.getElementById('new-promo-plan').value;
            const uses = document.getElementById('new-promo-uses').value;

            if (!code || !uses) return alert("Lütfen tüm alanları doldurun.");

            try {
                const res = await fetchAPI('/api/admin/promo', {
                    method: 'POST',
                    body: JSON.stringify({ code, target_plan: plan, max_uses: parseInt(uses) })
                });
                const data = await res.json();
                if (res.ok) {
                    alert(data.message);
                    document.getElementById('new-promo-code').value = '';
                    loadPromos();
                } else {
                    alert(data.error);
                }
            } catch (e) { }
        }

        async function initAdmin() {
            if (!adminToken) {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('admin-panel').style.display = 'none';
                return;
            }
            try {
                // Herhangi bir api çağırarak tokenı doğrula
                await loadStats();
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'flex';

                loadUsers();
                loadPromos();
            } catch (e) { } // 403 will automatically show login
        }

        window.onload = initAdmin;

    </script>
</body>

</html>
